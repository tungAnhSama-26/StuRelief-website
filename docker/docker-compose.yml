version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sturelief-db
    env_file:
      - .env
    environment:

      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-sturelief}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: ./docker/web.Dockerfile
    container_name: sturelief-web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:

      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-sturelief}?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-at-least-32-chars}
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - "3000:3000"
    volumes:
      - ../web:/app/web
      - ../shared:/app/shared
      - /app/web/node_modules
    command: npm run dev -w web

volumes:
  postgres_data:
